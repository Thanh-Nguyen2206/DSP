experiment:
  name: m06_large_effective_batch
  display_name: M06 - Larger Effective Batch
  description: Keeps physical batch_size=1 to avoid OOM, while increasing gradient
    accumulation.
model:
  repo_id: hynt/F5-TTS-Vietnamese-ViVoice
  ckpt_filename: model_last.pt
  vocab_filename: config.json
  dit:
    dim: 1024
    depth: 22
    heads: 16
    ff_mult: 2
    text_dim: 512
    conv_layers: 4
audio:
  sample_rate: 24000
  n_fft: 1024
  hop_length: 256
  win_length: 1024
  n_mel_channels: 100
data:
  processed_dir: data/processed
  metadata_path: data/metadata/metadata.csv
  num_workers: 2
training:
  epochs: 100
  batch_size: 1
  gradient_accumulation_steps: 12
  learning_rate: 9.0e-06
  weight_decay: 0.01
  betas:
  - 0.9
  - 0.999
  eps: 1.0e-08
  warmup_steps: 240
  scheduler: cosine
  min_lr: 1.0e-07
  max_grad_norm: 1.0
  mixed_precision: fp16
  seed: 47
checkpoint:
  save_dir: checkpoints/experiments/m06_large_effective_batch
  save_every_n_steps: 500
  keep_last_n: 3
logging:
  log_dir: logs/experiments/m06_large_effective_batch
  log_every_n_steps: 10
  tensorboard: true
augmentation:
  enabled: false
